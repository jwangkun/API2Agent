<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1536" viewBox="0 0 1536 1536" role="img" aria-label="Rounded white card with blue cyan code brackets icon">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="0" y2="1536" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbfcfd"/>
      <stop offset="0.55" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="35%" r="68%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.56" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#e9edf5" stop-opacity="0.55"/>
    </radialGradient>

    <linearGradient id="cardFill" x1="479" y1="235" x2="936" y2="1271" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.76" stop-color="#fefefd"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>

    <filter id="cardShadow" x="150" y="170" width="1240" height="1160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#e0e5ed" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="19" stdDeviation="23" flood-color="#d8dde8" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="45" stdDeviation="55" flood-color="#c6cedd" flood-opacity="0.20"/>
    </filter>

    <filter id="softInset" x="190" y="205" width="1160" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.8" result="blur"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComposite in="off" in2="SourceAlpha" operator="out" result="inner"/>
      <feColorMatrix in="inner" type="matrix" values="0 0 0 0 0.78  0 0 0 0 0.82  0 0 0 0 0.90  0 0 0 0.28 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>

    <linearGradient id="iconStroke" x1="368" y1="1004" x2="1012" y2="446" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0359ea"/>
      <stop offset="0.42" stop-color="#0067e9"/>
      <stop offset="0.72" stop-color="#04bfd8"/>
      <stop offset="1" stop-color="#05d6ce"/>
    </linearGradient>

    <linearGradient id="rightStroke" x1="874" y1="984" x2="1114" y2="515" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#025ee8"/>
      <stop offset="0.46" stop-color="#0069e9"/>
      <stop offset="0.78" stop-color="#05bed9"/>
      <stop offset="1" stop-color="#05d7cf"/>
    </linearGradient>

    <radialGradient id="centerDot" cx="43%" cy="30%" r="78%">
      <stop offset="0" stop-color="#09d6cf"/>
      <stop offset="0.58" stop-color="#05c6d8"/>
      <stop offset="1" stop-color="#078bdc"/>
    </radialGradient>

    <filter id="iconShadow" x="250" y="450" width="1020" height="610" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#024bb7" flood-opacity="0.22"/>
    </filter>

    <filter id="dotGlow" x="650" y="637" width="236" height="236" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00  0 0 0 0 0.84  0 0 0 0 0.84  0 0 0 0.34 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="watermarkSoft" x="0" y="0" width="1536" height="1536" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#d5dbe5" flood-opacity="0.5"/>
    </filter>

    <filter id="grain" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="grainAlpha">
        <feFuncA type="table" tableValues="0 0.028"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grainAlpha" mode="soft-light"/>
    </filter>
  </defs>

  <rect width="1536" height="1536" fill="url(#background)"/>
  <rect width="1536" height="1536" fill="url(#bgGlow)" opacity="0.88"/>

  <!-- Faint generated-image watermark at top-left, kept subtle to match the source appearance. -->
  <g filter="url(#watermarkSoft)" opacity="0.34">
    <rect x="40" y="42" width="244" height="92" rx="25" fill="#ffffff" fill-opacity="0.12" stroke="#e8edf3" stroke-opacity="0.72"/>
    <text x="77" y="101" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="45" font-weight="700" letter-spacing="2" fill="#ffffff" fill-opacity="0.52">AI生成</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="224" y="246" width="1088" height="1001" rx="184" ry="184" fill="url(#cardFill)" stroke="#eef1f6" stroke-opacity="0.82"/>
  </g>
  <rect x="226" y="248" width="1084" height="997" rx="182" ry="182" fill="none" stroke="#ffffff" stroke-opacity="0.65"/>

  <g filter="url(#iconShadow)">
    <polyline points="611,533 386,752 611,971" fill="none" stroke="url(#iconStroke)" stroke-width="104" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="925,533 1150,752 925,971" fill="none" stroke="url(#rightStroke)" stroke-width="104" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <circle cx="768" cy="752" r="62" fill="url(#centerDot)" filter="url(#dotGlow)"/>

  <!-- Faint original watermark impression at bottom-right. -->
  <g opacity="0.38" filter="url(#watermarkSoft)">
    <path d="M1204 1410 C1242 1395 1254 1368 1266 1327 C1283 1365 1307 1385 1348 1392 C1308 1405 1285 1426 1271 1466 C1258 1429 1237 1415 1204 1410 Z" fill="#ffffff" fill-opacity="0.60"/>
    <text x="1322" y="1436" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="44" font-weight="600" letter-spacing="3" fill="#ffffff" fill-opacity="0.50">即梦AI</text>
  </g>

  <rect width="1536" height="1536" fill="transparent" filter="url(#grain)" opacity="0.4"/>
</svg>
